<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战 - 联机版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #fff;
            overflow: hidden;
        }
        .page-wrapper {
            transform-origin: top center;
            flex-shrink: 0;
        }
        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }
        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            background: linear-gradient(90deg, #4CAF50, #FFD700, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .ui-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 800px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .player-info { display: flex; align-items: center; gap: 15px; }
        .player-label { font-size: 1.1rem; font-weight: bold; }
        .p1-color { color: #4CAF50; }
        .p2-color { color: #2196F3; }
        .health-bar {
            width: 150px; height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px; overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        .health-fill { height: 100%; transition: width 0.3s ease; border-radius: 8px; }
        .health-p1 { background: linear-gradient(90deg, #4CAF50, #8BC34A); }
        .health-p2 { background: linear-gradient(90deg, #2196F3, #64B5F6); }
        .round-info { font-size: 1.2rem; color: #FFD700; font-weight: bold; }
        #gameCanvas {
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }
        .controls {
            display: flex;
            justify-content: center;
            width: 800px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }
        .control-group { display: flex; flex-direction: column; gap: 3px; text-align: center; }
        .control-group span:first-child {
            color: rgba(255, 255, 255, 0.9);
            font-weight: bold; margin-bottom: 3px;
        }
        .key {
            display: inline-block; padding: 2px 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: monospace; margin: 0 2px;
        }
        .scale-panel {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px 20px;
            flex-shrink: 0;
        }
        .scale-panel-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.8);
            padding-right: 10px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .scale-value {
            font-size: 1.1rem;
            color: #FFD700;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
        }
        .scale-btns {
            display: flex;
            flex-direction: row;
            gap: 8px;
        }
        .scale-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            text-align: center;
            transition: background 0.2s;
        }
        .scale-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .scale-presets {
            display: flex;
            flex-direction: row;
            gap: 6px;
            padding-left: 10px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
        .scale-preset {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.7);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            text-align: center;
            transition: background 0.2s;
        }
        .scale-preset:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }
        .scale-preset.active {
            background: rgba(255, 215, 0, 0.15);
            border-color: rgba(255, 215, 0, 0.4);
            color: #FFD700;
        }
        .status-bar {
            width: 800px;
            padding: 8px 20px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            text-align: center;
            font-size: 0.9rem;
            color: #FFD700;
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f44336;
        }
        .status-dot.connected {
            background: #4CAF50;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .server-input {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .server-input input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            width: 300px;
        }
        .server-input input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .server-input button {
            background: linear-gradient(135deg, #4CAF50, #2196F3);
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .server-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
        <div class="scale-panel">
            <div class="scale-panel-title">界面缩放</div>
            <div class="scale-value" id="scaleDisplay">50%</div>
            <div class="scale-btns">
                <div class="scale-btn" onclick="changeScale(0.1)">+ 放大</div>
                <div class="scale-btn" onclick="changeScale(-0.1)">- 缩小</div>
            </div>
            <div class="scale-presets">
                <div class="scale-preset" onclick="setScale(0.25)">25%</div>
                <div class="scale-preset active" onclick="setScale(0.5)">50%</div>
                <div class="scale-preset" onclick="setScale(0.75)">75%</div>
                <div class="scale-preset" onclick="setScale(1)">100%</div>
            </div>
        </div>

        <div class="server-input" id="serverInput">
            <span style="color: rgba(255,255,255,0.7);">服务器地址:</span>
            <input type="text" id="serverUrl" placeholder="ws://服务器IP:8080" value="">
            <button onclick="connectToServer()">连接</button>
            <div class="connection-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText" style="color: rgba(255,255,255,0.7); font-size: 0.85rem;">未连接</span>
            </div>
        </div>

        <div class="page-wrapper" id="pageWrapper">
            <div class="game-container">
                <h1>坦克大战 - 联机版</h1>
                <div class="status-bar" id="statusBar" style="display: none;">等待对手加入...</div>
                <div class="ui-bar">
                    <div class="player-info">
                        <span class="player-label p1-color">玩家 1</span>
                        <div class="health-bar">
                            <div class="health-fill health-p1" id="health1" style="width: 100%"></div>
                        </div>
                        <span id="score1">0</span>
                    </div>
                    <div class="round-info">
                        第 <span id="round">1</span> 局
                        <span style="margin: 0 10px; color: rgba(255,255,255,0.3)">|</span>
                        地图 <span id="mapNum">?</span>
                    </div>
                    <div class="player-info">
                        <span id="score2">0</span>
                        <div class="health-bar">
                            <div class="health-fill health-p2" id="health2" style="width: 100%"></div>
                        </div>
                        <span class="player-label p2-color">玩家 2</span>
                    </div>
                </div>
                <canvas id="gameCanvas" width="800" height="800"></canvas>
                <div class="controls">
                    <div class="control-group">
                        <span>你的控制</span>
                        <span>前进/后退: <span class="key">↑</span><span class="key">↓</span> 或 <span class="key">W</span><span class="key">S</span></span>
                        <span>转向: <span class="key">←</span><span class="key">→</span> 或 <span class="key">A</span><span class="key">D</span></span>
                        <span>开火: <span class="key">L</span> 或 <span class="key">空格</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // ===== 缩放控制 =====
    let currentScale = 0.5;
    const MIN_SCALE = 0.1;
    const MAX_SCALE = 1.5;

    function setScale(val) {
        currentScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, val));
        document.getElementById('pageWrapper').style.transform = 'scale(' + currentScale + ')';
        document.getElementById('scaleDisplay').textContent = Math.round(currentScale * 100) + '%';
        document.querySelectorAll('.scale-preset').forEach(function(btn) {
            btn.classList.remove('active');
            if (parseFloat(btn.textContent) / 100 === currentScale) {
                btn.classList.add('active');
            }
        });
    }

    function changeScale(delta) {
        setScale(currentScale + delta);
    }

    setScale(0.5);

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 800, H = 800;

    // ===== 常量 =====
    const TANK_SIZE = 30;
    const TANK_COLLISION_RADIUS = TANK_SIZE / 2 * 1.5;
    const BULLET_RADIUS = 4;
    const MAX_HEALTH = 3;
    const WALL_THICKNESS = 4;

    // ===== 颜色 =====
    const C = {
        bg: '#1a1a2e',
        wall: '#8D6E63',
        wallGlow: 'rgba(141,110,99,0.25)',
        tank1: '#4CAF50', tank1D: '#388E3C', tank1L: '#81C784',
        tank2: '#2196F3', tank2D: '#1976D2', tank2L: '#64B5F6',
        bullet: '#FFD700', bulletGlow: '#FFF59D',
        text: '#FFFFFF', overlay: 'rgba(0,0,0,0.7)'
    };

    // ===== 地图定义 =====
    function makeBoundary() {
        const m = 10;
        return [
            { x1: m, y1: m, x2: W - m, y2: m },
            { x1: W - m, y1: m, x2: W - m, y2: H - m },
            { x1: W - m, y1: H - m, x2: m, y2: H - m },
            { x1: m, y1: H - m, x2: m, y2: m },
        ];
    }

    const maps = [
        {
            name: '经典十字',
            walls: [
                ...makeBoundary(),
                { x1: 300, y1: 300, x2: 500, y2: 300 },
                { x1: 300, y1: 500, x2: 500, y2: 500 },
                { x1: 300, y1: 300, x2: 300, y2: 500 },
                { x1: 500, y1: 300, x2: 500, y2: 500 },
                { x1: 100, y1: 100, x2: 200, y2: 100 },
                { x1: 100, y1: 100, x2: 100, y2: 200 },
                { x1: 700, y1: 100, x2: 600, y2: 100 },
                { x1: 700, y1: 100, x2: 700, y2: 200 },
                { x1: 100, y1: 700, x2: 200, y2: 700 },
                { x1: 100, y1: 700, x2: 100, y2: 600 },
                { x1: 700, y1: 700, x2: 600, y2: 700 },
                { x1: 700, y1: 700, x2: 700, y2: 600 },
                { x1: 200, y1: 200, x2: 250, y2: 200 },
                { x1: 600, y1: 200, x2: 550, y2: 200 },
                { x1: 200, y1: 600, x2: 250, y2: 600 },
                { x1: 600, y1: 600, x2: 550, y2: 600 },
            ],
        },
        {
            name: '堡垒',
            walls: [
                ...makeBoundary(),
                { x1: 350, y1: 350, x2: 450, y2: 350 },
                { x1: 450, y1: 350, x2: 450, y2: 450 },
                { x1: 450, y1: 450, x2: 350, y2: 450 },
                { x1: 350, y1: 450, x2: 350, y2: 350 },
                { x1: 350, y1: 350, x2: 250, y2: 350 },
                { x1: 350, y1: 350, x2: 350, y2: 250 },
                { x1: 450, y1: 350, x2: 550, y2: 350 },
                { x1: 450, y1: 350, x2: 450, y2: 250 },
                { x1: 350, y1: 450, x2: 250, y2: 450 },
                { x1: 350, y1: 450, x2: 350, y2: 550 },
                { x1: 450, y1: 450, x2: 550, y2: 450 },
                { x1: 450, y1: 450, x2: 450, y2: 550 },
                { x1: 150, y1: 150, x2: 250, y2: 150 },
                { x1: 150, y1: 150, x2: 150, y2: 250 },
                { x1: 650, y1: 150, x2: 550, y2: 150 },
                { x1: 650, y1: 150, x2: 650, y2: 250 },
                { x1: 150, y1: 650, x2: 250, y2: 650 },
                { x1: 150, y1: 650, x2: 150, y2: 550 },
                { x1: 650, y1: 650, x2: 550, y2: 650 },
                { x1: 650, y1: 650, x2: 650, y2: 550 },
                { x1: 200, y1: 400, x2: 300, y2: 400 },
                { x1: 500, y1: 400, x2: 600, y2: 400 },
                { x1: 400, y1: 200, x2: 400, y2: 300 },
                { x1: 400, y1: 500, x2: 400, y2: 600 },
            ],
        },
        {
            name: '迷宫',
            walls: [
                ...makeBoundary(),
                { x1: 100, y1: 150, x2: 300, y2: 150 },
                { x1: 500, y1: 150, x2: 700, y2: 150 },
                { x1: 100, y1: 650, x2: 300, y2: 650 },
                { x1: 500, y1: 650, x2: 700, y2: 650 },
                { x1: 150, y1: 250, x2: 150, y2: 400 },
                { x1: 150, y1: 400, x2: 150, y2: 550 },
                { x1: 650, y1: 250, x2: 650, y2: 400 },
                { x1: 650, y1: 400, x2: 650, y2: 550 },
                { x1: 250, y1: 250, x2: 400, y2: 250 },
                { x1: 400, y1: 250, x2: 550, y2: 250 },
                { x1: 250, y1: 550, x2: 400, y2: 550 },
                { x1: 400, y1: 550, x2: 550, y2: 550 },
                { x1: 350, y1: 350, x2: 450, y2: 350 },
                { x1: 350, y1: 450, x2: 450, y2: 450 },
                { x1: 350, y1: 350, x2: 350, y2: 450 },
                { x1: 450, y1: 350, x2: 450, y2: 450 },
                { x1: 300, y1: 300, x2: 300, y2: 350 },
                { x1: 500, y1: 300, x2: 500, y2: 350 },
                { x1: 300, y1: 450, x2: 300, y2: 500 },
                { x1: 500, y1: 450, x2: 500, y2: 500 },
                { x1: 200, y1: 350, x2: 250, y2: 400 },
                { x1: 600, y1: 350, x2: 550, y2: 400 },
                { x1: 200, y1: 450, x2: 250, y2: 400 },
                { x1: 600, y1: 450, x2: 550, y2: 400 },
            ],
        },
    ];

    // ===== 客户端状态 =====
    let ws = null;
    let connected = false;
    let myPlayerNum = 0;
    let gameState = 'disconnected'; // disconnected, waiting, playing, roundEnd, matchEnd
    let activeWalls = [];
    let tank1 = null;
    let tank2 = null;
    let bullets = [];
    let scores = [0, 0];
    let currentRound = 1;
    let winner = null;
    const keys = {};

    // ===== 连接服务器 =====
    function connectToServer() {
        const urlInput = document.getElementById('serverUrl');
        let serverUrl = urlInput.value.trim();
        
        if (!serverUrl) {
            // 如果没有输入，尝试使用当前页面的主机
            const host = window.location.hostname || 'localhost';
            serverUrl = `ws://${host}:8080`;
            urlInput.value = serverUrl;
        }

        updateStatus('connecting', '连接中...');
        
        try {
            ws = new WebSocket(serverUrl);
            
            ws.onopen = function() {
                connected = true;
                updateStatus('connected', '已连接');
                console.log('已连接到服务器');
            };
            
            ws.onmessage = function(event) {
                try {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                } catch (e) {
                    console.error('消息解析错误:', e);
                }
            };
            
            ws.onclose = function() {
                connected = false;
                updateStatus('disconnected', '连接已断开');
                gameState = 'disconnected';
                console.log('与服务器断开连接');
            };
            
            ws.onerror = function(error) {
                console.error('WebSocket错误:', error);
                updateStatus('error', '连接失败');
            };
        } catch (e) {
            console.error('连接错误:', e);
            updateStatus('error', '连接失败');
        }
    }

    function updateStatus(status, text) {
        const dot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const statusBar = document.getElementById('statusBar');
        
        dot.className = 'status-dot';
        if (status === 'connected') {
            dot.classList.add('connected');
        }
        statusText.textContent = text;
        
        if (status === 'connected' && gameState === 'waiting') {
            statusBar.style.display = 'block';
            statusBar.textContent = '等待对手加入...';
        } else if (status === 'connected' && gameState === 'playing') {
            statusBar.style.display = 'none';
        } else {
            statusBar.style.display = 'block';
            statusBar.textContent = text;
        }
    }

    // ===== 消息处理 =====
    function handleMessage(msg) {
        const { type, data } = msg;
        
        switch (type) {
            case 'welcome':
                console.log('欢迎!', data);
                break;
                
            case 'waiting':
                gameState = 'waiting';
                updateStatus('connected', '已连接');
                document.getElementById('statusBar').style.display = 'block';
                document.getElementById('statusBar').textContent = data.message;
                break;
                
            case 'gameStart':
                gameState = 'playing';
                myPlayerNum = data.yourPlayerNum;
                scores = data.scores;
                currentRound = data.round;
                activeWalls = maps[data.mapIndex].walls;
                document.getElementById('mapNum').textContent = data.mapIndex + 1;
                document.getElementById('statusBar').style.display = 'none';
                updateScoreUI();
                console.log('游戏开始! 你是玩家', myPlayerNum);
                break;
                
            case 'state':
                // 更新游戏状态
                tank1 = data.tank1;
                tank2 = data.tank2;
                bullets = data.bullets;
                scores = data.scores;
                currentRound = data.round;
                updateHealthUI();
                break;
                
            case 'roundEnd':
                winner = data.winner;
                scores = data.scores;
                gameState = data.state;
                updateScoreUI();
                break;
                
            case 'opponentLeft':
                gameState = 'waiting';
                document.getElementById('statusBar').style.display = 'block';
                document.getElementById('statusBar').textContent = '对手已离开，等待新对手...';
                break;
                
            case 'chat':
                console.log('聊天:', data);
                break;
        }
    }

    // ===== 发送输入 =====
    function sendInput() {
        if (!connected || !ws) return;
        
        // 统一控制方式：方向键或WASD都可以
        const input = {
            forward: keys['ArrowUp'] || keys['w'] || keys['W'],
            backward: keys['ArrowDown'] || keys['s'] || keys['S'],
            left: keys['ArrowLeft'] || keys['a'] || keys['A'],
            right: keys['ArrowRight'] || keys['d'] || keys['D'],
            fire: keys['l'] || keys['L'] || keys[' '],
        };
        
        ws.send(JSON.stringify({ type: 'input', data: input }));
    }

    // ===== UI更新 =====
    function updateHealthUI() {
        if (tank1) {
            document.getElementById('health1').style.width = (tank1.health / MAX_HEALTH * 100) + '%';
        }
        if (tank2) {
            document.getElementById('health2').style.width = (tank2.health / MAX_HEALTH * 100) + '%';
        }
    }

    function updateScoreUI() {
        document.getElementById('score1').textContent = scores[0];
        document.getElementById('score2').textContent = scores[1];
        document.getElementById('round').textContent = currentRound;
    }

    // ===== 绘制 =====
    function drawMap() {
        ctx.fillStyle = C.bg;
        ctx.fillRect(0, 0, W, H);

        // 网格
        ctx.strokeStyle = 'rgba(255,255,255,0.02)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= W; i += 40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke();
        }

        // 墙壁
        for (const w of activeWalls) {
            ctx.strokeStyle = C.wallGlow;
            ctx.lineWidth = WALL_THICKNESS + 6;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(w.x1, w.y1);
            ctx.lineTo(w.x2, w.y2);
            ctx.stroke();

            ctx.strokeStyle = C.wall;
            ctx.lineWidth = WALL_THICKNESS;
            ctx.beginPath();
            ctx.moveTo(w.x1, w.y1);
            ctx.lineTo(w.x2, w.y2);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(w.x1, w.y1);
            ctx.lineTo(w.x2, w.y2);
            ctx.stroke();
        }
    }

    function drawTank(tank, color, dark, light) {
        if (!tank) return;
        
        ctx.save();
        ctx.translate(tank.x, tank.y);
        ctx.rotate(tank.angle + Math.PI / 2);
        const s = TANK_SIZE / 2;

        // 阴影
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(-s + 3, -s + 3, TANK_SIZE, TANK_SIZE);

        // 车体
        ctx.fillStyle = color;
        ctx.fillRect(-s, -s, TANK_SIZE, TANK_SIZE);

        // 高光
        ctx.fillStyle = light;
        ctx.fillRect(-s, -s, TANK_SIZE, 3);
        ctx.fillRect(-s, -s, 3, TANK_SIZE);

        // 暗边
        ctx.fillStyle = dark;
        ctx.fillRect(-s, s - 3, TANK_SIZE, 3);
        ctx.fillRect(s - 3, -s, 3, TANK_SIZE);

        // 炮塔
        ctx.fillStyle = dark;
        ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = light;
        ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();

        // 炮管
        ctx.fillStyle = dark;
        ctx.fillRect(-2.5, -s - 10, 5, 14);
        ctx.fillStyle = light;
        ctx.fillRect(-1.5, -s - 10, 3, 14);

        ctx.restore();

        // 血条
        const pw = 6, ps = 3;
        const tw = MAX_HEALTH * pw + (MAX_HEALTH - 1) * ps;
        const sx = tank.x - tw / 2;
        for (let i = 0; i < MAX_HEALTH; i++) {
            ctx.fillStyle = i < tank.health ? color : 'rgba(255,255,255,0.15)';
            ctx.fillRect(sx + i * (pw + ps), tank.y - TANK_SIZE / 2 - 14, pw, 7);
        }
        
        // 玩家标识
        if (tank.num === myPlayerNum) {
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 12px "Courier New"';
            ctx.textAlign = 'center';
            ctx.fillText('你', tank.x, tank.y + TANK_SIZE / 2 + 18);
        }
    }

    function drawBullet(bullet) {
        if (!bullet || !bullet.alive) return;
        
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, BULLET_RADIUS + 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,215,0,0.25)';
        ctx.fill();

        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, BULLET_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = C.bullet;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(bullet.x - 1, bullet.y - 1, BULLET_RADIUS / 2, 0, Math.PI * 2);
        ctx.fillStyle = C.bulletGlow;
        ctx.fill();
    }

    function drawOverlay(text, sub) {
        ctx.fillStyle = C.overlay;
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = C.text;
        ctx.font = 'bold 48px "Courier New", monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(text, W / 2, H / 2 - 30);
        ctx.font = '24px "Courier New", monospace';
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillText(sub, W / 2, H / 2 + 30);
    }

    // ===== 游戏循环 =====
    function gameLoop() {
        // 发送输入
        if (gameState === 'playing') {
            sendInput();
        }

        // 绘制
        drawMap();
        
        if (tank1) drawTank(tank1, C.tank1, C.tank1D, C.tank1L);
        if (tank2) drawTank(tank2, C.tank2, C.tank2D, C.tank2L);
        
        for (const bullet of bullets) {
            drawBullet(bullet);
        }

        // 状态覆盖层
        if (gameState === 'disconnected') {
            drawOverlay('坦克大战', '输入服务器地址并点击连接');
        } else if (gameState === 'waiting') {
            drawOverlay('等待中...', '等待对手加入游戏');
        } else if (gameState === 'roundEnd') {
            const winText = winner === myPlayerNum ? '你赢了!' : '你输了!';
            drawOverlay(winText, '按 空格键 继续');
        } else if (gameState === 'matchEnd') {
            const winText = winner === myPlayerNum ? '你赢得比赛!' : '你输掉比赛!';
            drawOverlay(winText, '按 空格键 重新开始');
        }

        requestAnimationFrame(gameLoop);
    }

    // ===== 事件监听 =====
    document.addEventListener('keydown', (e) => {
        keys[e.key] = true;
        
        // 空格键处理
        if (e.key === ' ') {
            e.preventDefault();
            if (gameState === 'roundEnd' || gameState === 'matchEnd') {
                if (connected && ws) {
                    ws.send(JSON.stringify({ type: 'ready', data: {} }));
                }
            }
        }
    });
    
    document.addEventListener('keyup', (e) => {
        keys[e.key] = false;
    });

    // ===== 初始化 =====
    // 设置默认服务器地址
    const defaultHost = window.location.hostname || 'localhost';
    document.getElementById('serverUrl').value = `ws://${defaultHost}:8080`;
    
    // 初始化地图（用于显示背景）
    activeWalls = maps[0].walls;
    
    gameLoop();
    </script>
</body>
</html>
